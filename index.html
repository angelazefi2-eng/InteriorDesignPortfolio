<!DOCTYPE html>
<html>
<head>
    <title>Interior Design Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Interior Design Portfolio</h1>
    <p>Manage your interior design projects</p>

    <div class="container">

    <h2>Projects</h2>

    <div id="projectList"></div>

    <script src="script.js"></script>

</body>
</html>
